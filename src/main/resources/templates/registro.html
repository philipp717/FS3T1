<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear cuenta - HorasPro</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <a href="/" class="nav-brand">
            <span class="brand-icon">⚡</span> HorasPro
        </a>
        <div class="nav-right">
            <a href="/login" class="btn-nav btn-nav-login">Iniciar sesión</a>
        </div>
    </div>
</nav>

<main class="container">
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-icon">👤</div>
            <h2 class="auth-title">Crear cuenta</h2>
            <p class="auth-subtitle">Regístrate para comprar y ver tu historial de órdenes</p>

            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <form action="/registro" method="post" class="auth-form">
                <div class="form-group">
                    <label for="nombre">Nombre completo</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Juan Pérez" required class="form-input">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="tu@email.cl" required class="form-input">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required minlength="6" class="form-input">
                </div>
                <button type="submit" class="btn-auth">Crear cuenta →</button>
            </form>

            <p class="auth-link">¿Ya tienes cuenta? <a href="/login">Inicia sesión</a></p>
        </div>
    </div>
</main>

<footer class="footer">
    <p>© 2026 HorasPro · Todos los derechos reservados</p>
</footer>
</body>
</html>
