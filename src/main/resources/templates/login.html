<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - HorasPro</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <a href="/" class="nav-brand">
            <span class="brand-icon">⚡</span> HorasPro
        </a>
        <div class="nav-right">
            <a href="/registro" class="btn-nav btn-nav-login">Crear cuenta</a>
        </div>
    </div>
</nav>

<main class="container">
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-icon">🔐</div>
            <h2 class="auth-title">Iniciar sesión</h2>
            <p class="auth-subtitle">Accede a tu cuenta para gestionar tus servicios</p>

            <div th:if="${param.acceso}" class="alert alert-error">
                No tienes permisos para acceder a esa sección.
            </div>
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <form action="/login" method="post" class="auth-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="tu@email.cl" required class="form-input">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required class="form-input">
                </div>
                <button type="submit" class="btn-auth">Ingresar →</button>
            </form>

            <p class="auth-link">¿No tienes cuenta? <a href="/registro">Regístrate aquí</a></p>
        </div>
    </div>
</main>

<footer class="footer">
    <p>© 2026 HorasPro · Todos los derechos reservados</p>
</footer>
</body>
</html>
