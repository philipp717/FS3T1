spring.application.name=servicio-productos

# MySQL - XAMPP
spring.datasource.url=jdbc:mysql://localhost:3306/fs3t1?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# JPA / Hibernate
# update: agrega columnas/tablas faltantes sin borrar datos existentes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Cargar data.sql despues de que Hibernate cree/actualice las tablas
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# URL base de la app
app.base-url=http://localhost:8080
