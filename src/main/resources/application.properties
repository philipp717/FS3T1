spring.application.name=servicio-productos

# H2 en memoria
spring.datasource.url=jdbc:h2:mem:productosdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Consola H2 (accesible en /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Cargar datos iniciales
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# MercadoPago - reemplaza con tu Access Token de sandbox
# Obtener en: https://www.mercadopago.cl/developers/es/docs/getting-started
mercadopago.access-token=TEST-0000000000000000-000000-00000000000000000000000000000000-000000000

# URL base de la app (cambiar en produccion)
app.base-url=http://localhost:8080
